<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Showcase</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h1 {
            margin-bottom: 15px;
        }

        button {
            padding: 10px 15px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        /* Grid 4 sản phẩm */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        /* Card sản phẩm */
        .card {
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        /* Hover effect */
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
        }

        .price {
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

    <h1>Product Showcase ®</h1>

    <button onclick="togglePrice()">Toggle Price →</button>

    <div class="product-grid">

        <div class="card">
            <h2>Product A</h2>
            <p class="price">50 €</p>
            <p>High quality product for daily use.</p>
        </div>

        <div class="card">
            <h2>Product B</h2>
            <p class="price">75 €</p>
            <p>Modern design and durable material.</p>
        </div>

        <div class="card">
            <h2>Product C</h2>
            <p class="price">120 €</p>
            <p>Premium product with extra features.</p>
        </div>

        <div class="card">
            <h2>Product D</h2>
            <p class="price">90 €</p>
            <p>Best value for your money.</p>
        </div>

    </div>

    <script>
        function togglePrice() {
            let prices = document.getElementsByClassName("price");

            for (let i = 0; i < prices.length; i++) {
                if (prices[i].style.display === "none") {
                    prices[i].style.display = "block";
                } else {
                    prices[i].style.display = "none";
                }
            }
        }
    </script>

</body>
</html>
