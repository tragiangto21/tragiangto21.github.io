<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> <title>Exercise 3: Grade Calculator</title>
    <style>
        table { width: 50%; margin: 20px auto; border-collapse: collapse; }
        td, th { border: 1px solid #333; padding: 8px; text-align: center; }
        /* Alternating row colors [cite: 30] */
        tr:nth-child(even) { background-color: #f2f2f2; }
    </style>
</head>
<body>

<table>
    <tr>
        <th>Subject &sect;</th> <th>Grade (&ge;)</th> </tr>
    <tr><td>Math &reg;</td><td class="grade">8.5</td></tr> <tr><td>Physics</td><td class="grade">7.0</td></tr>
    <tr><td>Chemistry</td><td class="grade">9.0</td></tr>
    <tr><td>History</td><td class="grade">8.0</td></tr>
</table>

<div style="text-align: center;">
    <button onclick="calculateAverage()">Calculate Average</button>
    <p id="result"></p>
</div>

<script>
    function calculateAverage() {
        // Sử dụng querySelectorAll [cite: 32]
        var grades = document.querySelectorAll(".grade");
        var sum = 0;
        
        for (var i = 0; i < grades.length; i++) {
            // Chuyển text thành số
            sum += parseFloat(grades[i].innerText);
        }
        
        var avg = sum / grades.length;
        document.getElementById("result").innerText = "Average Grade: " + avg;
    }
</script>
</body>
</html>
