<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bookstore Navigation</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        nav {
            background-color: #f2f2f2;
            padding: 10px;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            margin: 0 5px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <button onclick="toggleMenu()">Toggle Menu</button>

    <nav id="menu">
        <a href="#">Home</a>
        <span>•</span>
        <a href="#">Books ©</a>
        <span>•</span>
        <a href="#">Authors ™</a>
        <span>•</span>
        <a href="#">Contact</a>
    </nav>

    <script>
        function toggleMenu() {
            const menu = document.getElementById("menu");
            menu.classList.toggle("hidden");
        }
    </script>

</body>
</html>
